<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Playable Universe</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <canvas id="stage"></canvas>

    <div id="upload-stack" class="corner-stack">
      <button id="structure-button" class="corner-button" type="button">Add Structure</button>
      <button id="reset-button" class="corner-button" type="button">Reset Universe</button>
      <button id="recenter-button" class="corner-button" type="button">Recenter Camera</button>
    </div>
    <input id="structure-input" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" hidden />

    <div id="advanced-panel" class="corner-panel" data-collapsed="true">
      <button class="panel-toggle" type="button" aria-controls="panel-body">Advanced</button>
      <div id="panel-body" class="panel-body"></div>
    </div>

    <div id="drop-overlay" data-state="idle">
      <p class="prompt">Play the universe.</p>
      <p class="hint">
        <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd><kbd>G</kbd><kbd>H</kbd><kbd>J</kbd><kbd>K</kbd>
        anchors &middot;
        <kbd>Q</kbd><kbd>W</kbd><kbd>E</kbd><kbd>R</kbd><kbd>T</kbd><kbd>Y</kbd><kbd>U</kbd><kbd>I</kbd>
        sparks &middot;
        <kbd>Space</kbd> drum
      </p>
    </div>

    <aside id="hud">
      <span id="hud-scale">outside observer</span>
      <span id="hud-time">0:00</span>
    </aside>

    <div id="piano" aria-hidden="true"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
