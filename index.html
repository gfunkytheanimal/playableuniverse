<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Playable Universe</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <canvas id="stage"></canvas>

    <div id="drop-overlay" data-state="idle">
      <p class="prompt">Drop an MP3 or WAV here, or click to choose a file.</p>
      <p class="hint">Or press <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd><kbd>G</kbd><kbd>H</kbd><kbd>J</kbd> to play the universe yourself.</p>
      <input id="file-input" type="file" accept="audio/*" hidden />
    </div>

    <aside id="hud">
      <span id="hud-scale">outside observer</span>
      <span id="hud-time">0:00</span>
    </aside>

    <div id="piano" aria-hidden="true"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
